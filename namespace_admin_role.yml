kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: gps-dev-admin-rl
  namespace: gps-aks-dev
  labels:
    fnf_app_id1: "17"
    fnf_app_name: "GlobalPremierServices"
    fnf_businessservice_id: "17.DEV"
    fnf_costcenter: "01400.901302.160"
    fnf_datacenter: "Azure"
    fnf_lineofbusiness_id: "1"
    fnf_parenthosting_id: "2.1"
rules:
- apiGroups:
  - extensions
  resources:
  - ingresses
  verbs: ["create","delete","deletecollection","get","list","patch","update","watch"]
- apiGroups:
  #- ""
  - apps
  resources:
  - daemonsets
  - deployments
  - replicasets
  - statefulsets
  verbs: ["create","delete","deletecollection","get","list","patch","update","watch"]
- apiGroups:
  - batch
  resources:
  - jobs
  - cronjobs
  verbs: ["create","delete","deletecollection","get","list","patch","update","watch"]
- apiGroups:
  - aadpodidentity.k8s.io
  resources:
  - azureidentities
  - azureidentitybindings
  - azurepodidentityexceptions
  - azureassignedidentities
  verbs: ["delete","deletecollection","get","list","patch","create","update","watch"]
- apiGroups:
  - ""
  resources:
  - deployments
  - deployments.app
  - configmaps
  - secrets
  - events
  - pods
  - pods/exec
  - pods/log
  - services
  - serviceaccounts
  - cronjobs.batch
  - serviceaccounts
  - daemonsets.apps
  - endpoints
  - events.events.k8s.io
  - horizontalpodautoscalers.autoscaling
  - podtemplates
  - replicasets.apps
  - replicationcontrollers
  - statefulsets.apps
  verbs: ["delete","deletecollection","get","list","patch","create","update","watch"]
- apiGroups:
  - networking.k8s.io
  resources:
  - ingressclasses
  - ingresses
  - networkpolicies
  verbs: ["create","delete","deletecollection","get","list","patch","update","watch"]
- apiGroups:
  - autoscaling
  resources:
  - horizontalpodautoscalers
  verbs: ["create","delete","deletecollection","get","list","patch","update","watch"]